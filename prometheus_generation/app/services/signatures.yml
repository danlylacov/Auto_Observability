# КОНФИГУРАЦИЯ ЭКСПОРТЕРОВ PROMETHEUS ДЛЯ РАЗЛИЧНЫХ СТЕКОВ
# Формат: stack_name -> конфигурация экспортера

# Databases
postgresql:
  job_name_suffix: "_postgres"
  exporter_port: 9187
  metrics_path: "/metrics"
  exporter_image: "prometheuscommunity/postgres-exporter:latest"
  env_vars:
    DATA_SOURCE_NAME: "postgresql://postgres:password@localhost:5432/postgres?sslmode=disable"
  env_template: "postgresql://{user}:{password}@{host}:{port}/{database}?sslmode=disable"

mongodb:
  job_name_suffix: "_mongodb"
  exporter_port: 9216
  metrics_path: "/metrics"
  exporter_image: "percona/mongodb_exporter:0.39"
  env_vars:
    MONGODB_URI: "mongodb://localhost:27017"
  env_template: "mongodb://{user}:{password}@{host}:{port}/{database}"



